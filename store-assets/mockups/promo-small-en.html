<!doctype html><html lang="en"><head><meta charset="utf-8"><style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:440px;height:280px}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
  background:linear-gradient(150deg,#fbfbfd 0%,#eceef2 100%);color:#1d1d1f;
  display:flex;flex-direction:column;justify-content:center;padding:32px 34px;overflow:hidden;
  -webkit-font-smoothing:antialiased}
.row{display:flex;align-items:center;gap:15px}
.logo{width:58px;height:58px;border-radius:15px;background:linear-gradient(160deg,#0a84ff 0%,#0060d6 100%);
  position:relative;flex:0 0 auto;box-shadow:0 8px 20px rgba(0,113,227,.32)}
.bars{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);display:flex;align-items:flex-end;gap:4px;height:22px}
.bars i{width:5px;border-radius:2.5px;background:#fff;display:block}
.bars i:nth-child(1){height:11px}.bars i:nth-child(2){height:22px}.bars i:nth-child(3){height:15px}
.logo::after{content:'';position:absolute;right:11px;top:11px;width:9px;height:9px;border-radius:50%;
  background:#ff453a;box-shadow:0 0 0 3px rgba(255,69,58,.25)}
h1{font-size:26px;font-weight:600;line-height:1.15;letter-spacing:-.6px}
.tag{font-size:15px;color:#5b5b60;margin-top:16px;line-height:1.55}
.badges{display:flex;gap:9px;margin-top:18px}
.b{font-size:13px;font-weight:500;padding:7px 13px;border-radius:999px;background:#fff;
  border:.5px solid rgba(0,0,0,.1);box-shadow:0 1px 2px rgba(0,0,0,.04)}
.b.blue{color:#0071e3}.b.green{color:#1a8f3c}
</style></head><body>
<div class="row"><div class="logo"><span class="bars"><i></i><i></i><i></i></span></div><h1>Tab Audio Recorder</h1></div>
<p class="tag">Record any tab's audio. Export WebM/Opus or MP3. Dark mode · EN / 简 / 繁.</p>
<div class="badges"><span class="b blue">MP3 / WebM</span>
<span class="b green">No upload</span><span class="b">No microphone</span></div>
</body></html>
