<!doctype html>
<html lang="zh-CN" data-theme="auto">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="popupHeading">标签页录音</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <div id="mainView">
        <header class="topbar">
          <div class="brand">
            <span class="status-dot" id="statusDot" aria-hidden="true"></span>
            <div>
              <h1 data-i18n="popupHeading">标签页录音</h1>
              <p id="statusText" data-i18n="statusReading">正在读取状态</p>
            </div>
          </div>
          <output class="timer" id="timer">00:00</output>
          <button id="settingsButton" class="icon-btn" type="button" aria-label="设置" data-i18n-aria="settingsTitle">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          </button>
        </header>

        <section class="info-panel" aria-label="录音信息" data-i18n-aria="ariaRecordingInfo">
          <div class="info-row">
            <span data-i18n="labelCurrentTab">当前标签页</span>
            <strong id="tabTitle">-</strong>
          </div>
          <div class="info-row">
            <span data-i18n="labelFormat">输出格式</span>
            <strong id="formatText">WebM / Opus</strong>
          </div>
          <div class="info-row">
            <span data-i18n="labelSaveMode">保存方式</span>
            <strong data-i18n="valueManualExport">手动导出</strong>
          </div>
          <div class="info-row">
            <span data-i18n="labelFileState">文件状态</span>
            <strong id="fileState" data-i18n="fileStateNone">未生成</strong>
          </div>
        </section>

        <div class="setting-row">
          <span data-i18n="settingAutoPause">标签页静音时自动暂停录音</span>
          <label class="toggle">
            <input type="checkbox" id="autoSyncToggle">
            <span class="toggle-track"></span>
          </label>
        </div>

        <div class="actions">
          <button id="startButton" type="button" data-i18n="btnStart">开始录制当前标签页</button>
          <div class="action-pair">
            <button id="pauseButton" class="secondary" type="button" disabled data-i18n="btnPause">暂停录制</button>
            <button id="stopButton" class="danger" type="button" disabled data-i18n="btnStop">停止录制</button>
          </div>
          <button id="exportButton" class="success" type="button" disabled data-i18n="btnExport">导出录音文件</button>
          <button id="resetButton" class="ghost" type="button" data-i18n="btnReset">重置</button>
        </div>

        <p class="message" id="message" role="status" aria-live="polite"></p>
      </div>

      <div id="settingsView" hidden>
        <header class="settings-bar">
          <button id="backButton" class="icon-btn" type="button" aria-label="返回" data-i18n-aria="a11yBack">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"></polyline></svg>
          </button>
          <h1 class="settings-title" data-i18n="settingsTitle">设置</h1>
        </header>

        <p class="group-label" data-i18n="settingLanguage">界面语言</p>
        <div class="opt-list" id="langOptions">
          <button type="button" class="opt-row" data-lang="zh_CN">
            <span>简体中文</span>
            <span class="opt-check" aria-hidden="true">✓</span>
          </button>
          <button type="button" class="opt-row" data-lang="zh_TW">
            <span>繁體中文</span>
            <span class="opt-check" aria-hidden="true">✓</span>
          </button>
          <button type="button" class="opt-row" data-lang="en">
            <span>English</span>
            <span class="opt-check" aria-hidden="true">✓</span>
          </button>
          <button type="button" class="opt-row" data-lang="auto">
            <span data-i18n="langFollowSystem">跟随系统语言</span>
            <span class="opt-check" aria-hidden="true">✓</span>
          </button>
        </div>

        <p class="group-label" data-i18n="settingTheme">主题</p>
        <div class="opt-list" id="themeOptions">
          <button type="button" class="opt-row" data-theme-opt="light">
            <span data-i18n="themeLight">浅色</span>
            <span class="opt-check" aria-hidden="true">✓</span>
          </button>
          <button type="button" class="opt-row" data-theme-opt="dark">
            <span data-i18n="themeDark">深色</span>
            <span class="opt-check" aria-hidden="true">✓</span>
          </button>
          <button type="button" class="opt-row" data-theme-opt="auto">
            <span data-i18n="themeSystem">跟随系统</span>
            <span class="opt-check" aria-hidden="true">✓</span>
          </button>
        </div>

        <p class="group-label" data-i18n="settingExportFormat">导出格式</p>
        <div class="opt-list" id="formatOptions">
          <button type="button" class="opt-row" data-format="webm">
            <span data-i18n="exportFormatWebm">WebM(原始)</span>
            <span class="opt-check" aria-hidden="true">✓</span>
          </button>
          <button type="button" class="opt-row" data-format="mp3">
            <span data-i18n="exportFormatMp3">MP3</span>
            <span class="opt-check" aria-hidden="true">✓</span>
          </button>
        </div>
      </div>
    </main>

    <script src="i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
