<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>标签页录音</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="topbar">
        <div class="brand">
          <span class="status-dot" id="statusDot" aria-hidden="true"></span>
          <div>
            <h1>标签页录音</h1>
            <p id="statusText">正在读取状态</p>
          </div>
        </div>
        <output class="timer" id="timer">00:00</output>
      </header>

      <section class="info-panel" aria-label="录音信息">
        <div class="info-row">
          <span>当前标签页</span>
          <strong id="tabTitle">-</strong>
        </div>
        <div class="info-row">
          <span>输出格式</span>
          <strong id="formatText">WebM / Opus</strong>
        </div>
        <div class="info-row">
          <span>保存方式</span>
          <strong>浏览器下载</strong>
        </div>
      </section>

      <div class="actions">
        <button id="startButton" type="button">开始录制当前标签页</button>
        <button id="stopButton" class="danger" type="button" disabled>停止并保存</button>
      </div>

      <p class="message" id="message" role="status" aria-live="polite"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
